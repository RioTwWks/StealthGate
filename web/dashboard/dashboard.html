<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StealthGate — Дашборд</title>
  <link rel="stylesheet" href="/ui/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand compact">
        <div class="brand-mark">SG</div>
        <strong>StealthGate</strong>
      </div>
      <nav class="nav">
        <a class="nav-link active" href="/ui/dashboard.html">Дашборд</a>
        <a class="nav-link" href="/ui/users.html" data-role="admin">Пользователи</a>
      </nav>
      <div class="sidebar-footer">
        <div id="current-user" class="muted"></div>
        <button id="logout-btn" class="btn ghost">Выйти</button>
      </div>
    </aside>

    <main class="content">
      <header class="page-header">
        <div>
          <h1>Дашборд</h1>
          <p class="muted">Статистика и настройки MTProto-прокси</p>
        </div>
        <button id="reload-btn" class="btn">Перезагрузить конфиг</button>
      </header>

      <section class="grid stats-grid" id="stats-grid"></section>

      <section class="panel">
        <h2>Ссылка для Telegram</h2>
        <p class="muted">Скопируй ссылку и открой в клиенте Telegram</p>
        <div class="form-grid">
          <input id="proxy-link" type="text" readonly>
          <div class="form-actions">
            <button id="copy-proxy-link" type="button" class="btn">Копировать</button>
          </div>
        </div>
        <div class="qr-wrap">
          <img id="proxy-qr" alt="QR-код tg://proxy" width="200" height="200">
        </div>
      </section>

      <section class="panel">
        <h2>MTProto</h2>
        <form id="mtproto-form" class="form-grid">
          <label>
            Секрет
            <input type="text" name="secret" required>
          </label>
          <label>
            Backend
            <input type="text" name="backend" required>
          </label>
          <label>
            Fake domain
            <input type="text" name="fake_domain" required>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn primary">Сохранить MTProto</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Фрагментация</h2>
        <form id="fragmentation-form" class="form-grid">
          <label class="checkbox">
            <input type="checkbox" name="enabled">
            Включить фрагментацию
          </label>
          <label>
            Chunk sizes (через запятую)
            <input type="text" name="chunk_sizes" placeholder="1,2,3,2,1">
          </label>
          <label>
            Delay, ms
            <input type="number" name="delay_ms" min="0" value="0">
          </label>
          <div class="form-actions">
            <button type="submit" class="btn primary">Сохранить фрагментацию</button>
          </div>
        </form>
      </section>

      <section class="panel danger-panel hidden" id="uninstall-panel" data-role="admin">
        <h2>Удаление сервиса</h2>
        <p class="muted">
          Остановит systemd-сервис и удалит unit. Опционально — все файлы и конфигурацию.
        </p>
        <form id="uninstall-form" class="form-grid">
          <label class="checkbox">
            <input type="checkbox" name="purge">
            Полное удаление (--purge): /opt/stealth-gate, /etc/stealth-gate, пользователь
          </label>
          <label>
            Подтверждение: введи <code>UNINSTALL</code>
            <input type="text" name="confirm" autocomplete="off" placeholder="UNINSTALL">
          </label>
          <div class="form-actions">
            <button type="submit" class="btn danger">Удалить сервис</button>
          </div>
        </form>
      </section>

      <p id="dashboard-message" class="message hidden"></p>
    </main>
  </div>
  <script src="/ui/app.js"></script>
  <script>
    initDashboardPage();
  </script>
</body>
</html>
