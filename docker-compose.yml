version: '3.8'

services:
  # Заглушка — сайт, который увидят сканеры
  web:
    image: nginx:alpine
    container_name: dummy-site
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro

  # Ваш прокси (сборка из исходников)
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-proxy
    ports:
      - "443:443"
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      - web
    restart: unless-stopped