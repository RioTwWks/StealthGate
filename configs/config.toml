[listen]
host = "0.0.0.0"
port = 443

[tls]
cert_file = "certs/cert.pem"
key_file = "certs/key.pem"
fake_domain = "www.cloudflare.com"
# ja4_profile = "t13d..."
# ja4_enforce через [security]

[mtproto]
secret = "ee0123456789abcdef0123456789abcdef"
backend = "149.154.167.99:443"
# Дополнительные DC для failover (приоритет: backend, затем backends)
backends = ["149.154.175.50:443", "149.154.175.100:443"]
failover_strategy = "priority"  # priority | round_robin

# Дополнительные секреты (опционально)
# [[mtproto.secrets]]
# label = "friends"
# secret = "ee0123456789abcdef0123456789abcdef"
# backend = "149.154.175.50:443"
# max_connections = 100

[fallback]
static_html = "web/index.html"
domain_fronting = "sni"
fronting_port = 443
# domain_fronting = "fixed"
# fronting_host = "www.cloudflare.com"

[fragmentation]
enabled = true
chunk_sizes = [1, 2, 3, 2, 1]
delay_ms = 0

[drs]
enabled = false
record_sizes = [512, 1024, 1398, 256]

[dd]
min_chunk_size = 64
max_chunk_size = 1024

[webhooks]
enabled = false
urls = []
events = ["config_reloaded", "secret_updated", "backend_failover", "proxy_started"]

[security]
antireplay_cache_size = 65536
ja4_enforce = false
max_connections_per_ip = 0
ip_blacklist = []

[network]
# socks5_proxy = "socks5://127.0.0.1:9050"
backend_timeout_secs = 30

[metrics]
enabled = true
host = "127.0.0.1"
port = 9091

[admin]
socket = "/tmp/stealth-gate.sock"
# Включить после deploy/install.sh для кнопки удаления в WebUI
uninstall_enabled = false
uninstall_script = "/opt/stealth-gate/bin/uninstall"

[webui]
enabled = true
host = "127.0.0.1"
port = 8088
session_secret = "change-me-in-production"
users_file = "data/users.json"
